<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Route Planner</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Local CSS -->
    <link rel="stylesheet" href="/route-app/css/mainPage.css">
</head>
<body>
    <main class="app-container">
        
        <!-- Sidebar Navigation & Routing Controls -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <header class="sidebar-header">
                </header>

                <form id="routing-form" class="routing-form">
                    <!-- Start Input -->
                    <div class="input-group">
                        <label for="start-location">Start</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                            </span>
                            <input type="text" id="start-location" name="start-location" required autocomplete="off">
                        </div>
                    </div>
                    
                    <!-- Destination Input -->
                    <div class="input-group">
                        <label for="end-location">Destination</label>
                        <div class="input-wrapper">
                            <span class="input-icon marker-dest">
                            </span>
                            <input type="text" id="end-location" name="end-location" required autocomplete="off">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-route" id="btn-route">
                        <span>Route</span>
                    </button>
                </form>

                <div class="route-info" id="route-info" style="display: none;">
                    <div class="route-stat">
                        <span class="route-stat-label">Est. Time</span>
                        <span class="route-stat-value" id="est-time">12 min</span>
                    </div>
                    <div class="route-stat">
                        <span class="route-stat-label">Distance</span>
                        <span class="route-stat-value" id="est-dist">2.4 mi</span>
                    </div>
                </div>
            </div>

            <!-- Bottom Navigation Links -->
            <div class="sidebar-bottom">
                <nav class="user-nav">
                    <a href="resetPWSignedIn.html" class="nav-link">
                        Reset Password
                    </a>
                    <a href="#" class="nav-link">
                        Saved Routes
                    </a>
                </nav>
                <div class="nav-divider"></div>
                <button class="btn btn-secondary btn-signout" onclick="window.location.href='signin.html'">
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Map Area -->
        <section class="map-container" id="map-wrap">
            <div id="map-view"></div>
            <!-- Loading overlay for UI feedback -->
            <div class="map-loading-overlay" id="map-loading">
                <div class="spinner"></div><p>Calculating Route...</p>
            </div>
        </section>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Local Script -->
    <script src="/route-app/JS/script.js"></script>
</body>
</html>
