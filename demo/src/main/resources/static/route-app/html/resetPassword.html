<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trinity - Reset Password</title>
    <link rel="stylesheet" href="../css/resetPassword.css" />
  </head>
  <body>
    <div class="frame">
      <div class="panel">
        <div class="brand-box">
          <h1 class="brand">Trinity</h1>
        </div>


        <div class="title">Reset Password</div>


        <form class="form" id="signupForm" autocomplete="off">
          <div class="row">
            <div class="label">Username :</div>
            <input id="suUsername" type="text" />
          </div>


          <div class="row">
            <div class="label">New Password :</div>
            <input id="suPassword" type="password" />
          </div>


          <div class="row">
            <div class="label">Confirm<br />Password :</div>
            <input id="suConfirm" type="password" />
          </div>


          <div class="message-wrap">
            <div class="message" id="messageBox">Message text box field</div>
          </div>


          <div class="actions">
            <button type="submit" class="link-btn">Submit</button>
            <button type="button" class="link-btn small" id="signInBtn">
              Sign In
            </button>
          </div>
        </form>
      </div>
    </div>


    <script src="../JS/resetPassword.js"></script>
  </body>
</html>
