<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trinity - Sign In</title>
    <link rel="stylesheet" href="../css/signIn.css" />
  </head>
  <body>
    <div class="frame">
      <div class="panel">
        <div class="brand-box">
          <h1 class="brand">Trinity</h1>
        </div>


        <div class="title">Sign In</div>


        <form class="form" id="loginForm" autocomplete="off">
          <div class="row">
            <div class="label">Username:</div>
            <input id="username" type="text" />
          </div>


          <div class="row">
            <div class="label">Password:</div>
            <input id="password" type="password" />
          </div>


          <div class="message-wrap">
            <div class="message" id="messageBox">Message textbox field</div>
          </div>


          <div class="actions">
            <button type="submit" class="link-btn">Submit</button>
            <button type="button" class="link-btn small" id="signupBtn" onclick="window.location.href='signup.html'">
              Sign Up
            </button>
            <button type="button" class="link-btn large" id="forgotBtn" onclick="window.location.href='resetPassword.html'">
              Forgot Password?
            </button>
          </div>
        </form>
      </div>
    </div>


    <script src="../JS/signIn.js"></script>
  </body>
</html>
