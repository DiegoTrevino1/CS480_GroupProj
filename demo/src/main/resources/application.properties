# ── Database ───────────────────────────────────────────────────────────────────
# Database name matches your SQL script: trinity
spring.datasource.url=jdbc:mysql://localhost:3306/trinity?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# validate = confirms @Entity fields match your existing tables without changing them
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Google Maps ────────────────────────────────────────────────────────────────
google.maps.api-key=YOUR_GOOGLE_MAPS_API_KEY

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080